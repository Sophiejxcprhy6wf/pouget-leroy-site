<svg viewBox="0 0 820 730" xmlns="http://www.w3.org/2000/svg">

  <rect width="820" height="730" fill="#f2ede8"/>

  <!-- Titre -->
  <text font-family="'Cormorant Garamond', Georgia, serif" font-weight="300" font-size="18" fill="#5a4f47" text-anchor="middle" letter-spacing="2" x="410" y="36">SOMMES-NOUS DES OSTÉOPATHES ?</text>
  <text font-family="'Jost', Arial, sans-serif" font-weight="300" font-size="10" fill="#9a8f87" text-anchor="middle" letter-spacing="1" x="410" y="52">Matrice tenségrale de l'identité professionnelle OA · Sophie Pouget-Leroy</text>

  <!-- TENSION LINES -->
  <line stroke="#b3a49a" stroke-width="1.5" opacity="0.8" x1="410" y1="320" x2="200" y2="205"/>
  <line stroke="#b3a49a" stroke-width="1.5" opacity="0.8" x1="410" y1="320" x2="620" y2="205"/>
  <line stroke="#b3a49a" stroke-width="1.5" opacity="0.8" x1="410" y1="320" x2="200" y2="460"/>
  <line stroke="#b3a49a" stroke-width="1.5" opacity="0.8" x1="410" y1="320" x2="620" y2="460"/>
  <line stroke="#8c7d74" stroke-width="1" stroke-dasharray="5 4" opacity="0.7" x1="200" y1="205" x2="620" y2="205"/>
  <line stroke="#8c7d74" stroke-width="1" stroke-dasharray="5 4" opacity="0.7" x1="620" y1="205" x2="620" y2="460"/>
  <line stroke="#8c7d74" stroke-width="1" stroke-dasharray="5 4" opacity="0.7" x1="620" y1="460" x2="200" y2="460"/>
  <line stroke="#8c7d74" stroke-width="1" stroke-dasharray="5 4" opacity="0.7" x1="200" y1="460" x2="200" y2="205"/>
  <line stroke="#8c7d74" stroke-width="1" stroke-dasharray="2 7" opacity="0.45" x1="200" y1="205" x2="620" y2="460"/>
  <line stroke="#8c7d74" stroke-width="1" stroke-dasharray="2 7" opacity="0.45" x1="620" y1="205" x2="200" y2="460"/>

  <!-- Connecteurs pôles → sous-nœuds -->
  <line stroke="#c4b9b1" stroke-width="0.9" opacity="0.6" x1="200" y1="167" x2="200" y2="132"/>
  <line stroke="#c4b9b1" stroke-width="0.9" opacity="0.6" x1="620" y1="167" x2="620" y2="132"/>
  <line stroke="#c4b9b1" stroke-width="0.9" opacity="0.6" x1="200" y1="498" x2="200" y2="512"/>
  <line stroke="#c4b9b1" stroke-width="0.9" opacity="0.6" x1="620" y1="498" x2="620" y2="512"/>

