  <ellipse cx="200" cy="205" rx="90" ry="38" fill="#e0cfc6" stroke="#c8b5ab" stroke-width="1.2"/>
  <text font-family="'Cormorant Garamond', Georgia, serif" font-size="14" fill="#3d352e" text-anchor="middle" x="200" y="198">Identité</text>
  <text font-family="'Cormorant Garamond', Georgia, serif" font-size="14" fill="#3d352e" text-anchor="middle" x="200" y="215">en devenir</text>

  <ellipse cx="620" cy="205" rx="90" ry="38" fill="#d8d0c4" stroke="#bfb6a8" stroke-width="1.2"/>
  <text font-family="'Cormorant Garamond', Georgia, serif" font-size="14" fill="#3d352e" text-anchor="middle" x="620" y="209">Professionnalisation</text>

  <ellipse cx="200" cy="460" rx="90" ry="38" fill="#ccd4c2" stroke="#b3bca9" stroke-width="1.2"/>
  <text font-family="'Cormorant Garamond', Georgia, serif" font-size="14" fill="#3d352e" text-anchor="middle" x="200" y="464">Accompagnement</text>

  <ellipse cx="620" cy="460" rx="90" ry="38" fill="#e0cfc6" stroke="#c8b5ab" stroke-width="1.2"/>
  <text font-family="'Cormorant Garamond', Georgia, serif" font-size="14" fill="#3d352e" text-anchor="middle" x="620" y="464">Congruence</text>

